version: "3.8"

services:
  leandrop:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - leandrop-data:/app/data
    environment:
      - PORT=8080
      - DATA_DIR=/app/data
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
    restart: unless-stopped

volumes:
  leandrop-data:
