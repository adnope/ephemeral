services:
  ephemeral:
    image: adnope/ephemeral:indev
    mem_limit: 768m
    mem_reservation: 512m
    ports:
      - "8080:8080"
    volumes:
      - ephemeral-data:/app/data
    environment:
      - GOMEMLIMIT=128MiB
      - GOGC=50
      - PORT=8080
      - DATA_DIR=/app/data
      - SESSION_TTL=${SESSION_TTL:-30d}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-}
      - CHAT_PAGE_SIZE=${CHAT_PAGE_SIZE:-100}
      - HISTORY_PAGE_SIZE=${HISTORY_PAGE_SIZE:-100}
      - SEARCH_RESULT_LIMIT=${SEARCH_RESULT_LIMIT:-30}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-2GiB}
      - TEXT_PREVIEW_MAX=${TEXT_PREVIEW_MAX:-10MiB}
      - BODY_INDEX_MAX=${BODY_INDEX_MAX:-20MiB}
      - MEDIA_WORKER_COUNT=${MEDIA_WORKER_COUNT:-1}
      - MEDIA_PROCESS_TIMEOUT=${MEDIA_PROCESS_TIMEOUT:-30m}
      - HLS_MIN_SIZE=${HLS_MIN_SIZE:-100MiB}
      - HLS_MIN_DURATION=${HLS_MIN_DURATION:-5m}
      - UPLOAD_CONCURRENCY=${UPLOAD_CONCURRENCY:-1}
    restart: unless-stopped

volumes:
  ephemeral-data:
