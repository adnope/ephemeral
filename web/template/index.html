{{define "index.html"}}
<!doctype html>
<html>
  <head>
    <title>Ephemeral</title>
    <link rel="stylesheet" href="/static/app.css" />
    <script src="/static/app.min.js" defer></script>
  </head>
  <body x-data="ephemeral()">
    <div
      class="chat-app"
      @dragover.prevent="dragover = true"
      @dragleave.prevent="dragover = false"
      @drop.prevent="handleDrop"
    >
      <div x-show="dragover" class="drag-overlay" style="display: none">
        Drop file here to upload
      </div>

      <header>
        <h1>Ephemeral</h1>
        <nav class="top-nav" aria-label="Primary navigation">
          <div class="top-nav-links">
            <a href="/" class="top-nav-link is-active">Chat</a>
            <a href="/history" class="top-nav-link">History</a>
          </div>

          <form method="POST" action="/api/logout" class="top-nav-logout">
            <button type="submit" class="top-nav-logout-btn">Logout</button>
          </form>
        </nav>
      </header>

      <main id="chat-stream">
        {{range .Items}} {{template "item_partial" .}} {{end}} {{if
        .NextCursor}}
        <div class="load-more-row">
          <button
            type="button"
            class="load-more-btn"
            hx-get="/?cursor={{.NextCursor}}"
            hx-trigger="click"
            hx-target="closest .load-more-row"
            hx-swap="outerHTML"
          >
            Load older messages
          </button>
        </div>
        {{end}}
      </main>

      <footer>
        <form @submit.prevent="sendMessage" class="input-form">
          <label class="composer-icon-btn" aria-label="Attach files">
            <img src="/static/attachment.svg" alt="" class="composer-icon" />
            <input
              type="file"
              multiple
              @change="handleFileSelect"
              @cancel="$el.blur()"
              @click="$el.blur()"
              class="visually-hidden-file-input"
            />
          </label>

          <textarea
            x-ref="messageInput"
            x-model="message"
            placeholder="Type message..."
            class="input-text composer-input"
            @input="resize($el)"
            @keydown.enter.prevent="if (!$event.shiftKey) sendMessage(); else { message += '\n'; $nextTick(() => resize($el)); }"
            rows="1"
          ></textarea>

          <button
            type="submit"
            class="composer-send-btn"
            aria-label="Send message"
          >
            &#10148;
          </button>
        </form>

        <span x-show="uploading" class="upload-status" style="display: none">
          Uploading file...
        </span>
      </footer>
    </div>

    <dialog x-ref="videoPlayerDialog" class="media-dialog" tabindex="-1">
      <div class="media-dialog-actions">
        <a :href="activeVideoUrl" :download="activeVideoName" class="btn">
          Download
        </a>
        <button type="button" @click="closeVideoPlayer" class="btn">
          Close
        </button>
      </div>

      <div class="media-dialog-title" x-text="activeVideoName"></div>

      <video
        x-ref="videoPlayer"
        controls
        preload="none"
        class="media-dialog-video"
      ></video>
    </dialog>

    {{template "media_scripts" .}}

    <script>
      function ephemeral() {
        return {
          uploading: false,
          dragover: false,
          message: "",
          activeVideoUrl: "",
          activeVideoName: "",
          activeVideoMime: "",

          init() {
            const es = new EventSource("/api/events");
            let refreshTimer = 0;

            const refreshChat = () => {
              window.clearTimeout(refreshTimer);
              refreshTimer = window.setTimeout(() => {
                htmx.ajax("GET", "/", {
                  target: "#chat-stream",
                  swap: "innerHTML",
                });
              }, 250);
            };

            es.addEventListener("item:new", refreshChat);
            es.addEventListener("item:updated", refreshChat);
          },

          async handleDrop(e) {
            this.dragover = false;
            const files = e.dataTransfer.files;
            if (!files || files.length === 0) return;

            for (let i = 0; i < files.length; i++) {
              await this.uploadFile(files[i]);
            }
          },

          async handleFileSelect(e) {
            const input = e.target;
            const files = input.files;

            try {
              if (!files || files.length === 0) return;

              for (let i = 0; i < files.length; i++) {
                await this.uploadFile(files[i]);
              }
            } finally {
              input.value = "";
              input.blur();
            }
          },

          async uploadFile(file) {
            this.uploading = true;

            try {
              const form = new FormData();
              form.append("file", file);

              const response = await fetch("/api/upload", {
                method: "POST",
                body: form,
              });

              if (!response.ok) {
                throw new Error(`upload failed: ${response.status}`);
              }
            } finally {
              this.uploading = false;
            }
          },

          async sendMessage() {
            const text = this.message.trim();
            if (!text) return;

            const params = new URLSearchParams();
            params.append("text", text);

            const response = await fetch("/api/message", {
              method: "POST",
              body: params,
            });

            if (!response.ok) {
              throw new Error(`send message failed: ${response.status}`);
            }

            this.message = "";
            this.$nextTick(() => {
              if (this.$refs.messageInput) {
                this.$refs.messageInput.style.height = "auto";
              }
            });
          },

          openVideoPlayer(el) {
            if (!(el instanceof HTMLElement)) return;

            this.activeVideoUrl = el.dataset.videoUrl || "";
            this.activeVideoMime = el.dataset.videoMime || "video/mp4";
            this.activeVideoName = el.dataset.videoName || "video";

            if (!this.activeVideoUrl) return;

            this.$nextTick(() => {
              const video = this.$refs.videoPlayer;
              const dialog = this.$refs.videoPlayerDialog;

              if (!(video instanceof HTMLVideoElement)) return;
              if (!(dialog instanceof HTMLDialogElement)) return;

              video.pause();
              video.removeAttribute("src");
              video.innerHTML = "";

              const source = document.createElement("source");
              source.src = this.activeVideoUrl;
              source.type = this.activeVideoMime;
              video.appendChild(source);

              video.load();
              dialog.showModal();
            });
          },

          closeVideoPlayer() {
            const video = this.$refs.videoPlayer;
            const dialog = this.$refs.videoPlayerDialog;

            if (video instanceof HTMLVideoElement) {
              video.pause();
              video.removeAttribute("src");
              video.innerHTML = "";
              video.load();
            }

            if (dialog instanceof HTMLDialogElement && dialog.open) {
              dialog.close();
            }
          },

          resize(el) {
            el.style.height = "auto";
            el.style.height = el.scrollHeight + "px";
          },
        };
      }
    </script>
  </body>
</html>
{{end}}
