{{define "login.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0f13">
    <title>LeanDrop - Login</title>
    <link rel="stylesheet" href="/static/app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1 class="login-logo">LeanDrop</h1>
                {{if .IsSetup}}
                <p class="login-subtitle">Create your account to get started</p>
                {{else}}
                <p class="login-subtitle">Sign in to continue</p>
                {{end}}
            </div>

            {{if .Error}}
            <div class="login-error">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/login" class="login-form" id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                           placeholder="Enter username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Enter password" autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="btn-login">
                    {{if .IsSetup}}Create Account{{else}}Sign In{{end}}
                </button>
            </form>
        </div>
        <p class="login-footer">Instant sync across your devices</p>
    </div>
</body>
</html>
{{end}}
