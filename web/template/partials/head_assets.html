{{define "stylesheet_bootstrap"}}
<style>
  html.app-shell-loading body {
    visibility: hidden;
  }
</style>
<script>
  (() => {
    const root = document.documentElement;
    root.classList.add("app-shell-loading");

    window.__ephemeralStylesReady = () => {
      root.classList.remove("app-shell-loading");
      delete window.__ephemeralStylesReady;
    };

    window.setTimeout(() => {
      if (window.__ephemeralStylesReady) window.__ephemeralStylesReady();
    }, 2000);
  })();
</script>
<link
  rel="stylesheet"
  href="/static/app.css"
  onload="window.__ephemeralStylesReady && window.__ephemeralStylesReady()"
  onerror="window.__ephemeralStylesReady && window.__ephemeralStylesReady()"
/>
<script>
  (() => {
    const uploadStoreName = "uploads";

    const configuredConcurrency = () => {
      const raw = document.body?.dataset.uploadConcurrency || "";
      const parsed = Number.parseInt(raw, 10);
      return Number.isSafeInteger(parsed) && parsed > 0 ? parsed : 1;
    };

    const createUploadStore = () => ({
      uploads: [],
      uploadSeq: 0,
      activeUploads: 0,
      maxConcurrentUploads: configuredConcurrency(),
      uploadQueueCollapsed: false,

      get hasUploads() {
        return this.uploads.length > 0;
      },

      get totalUploadBytes() {
        return this.uploads.reduce((sum, upload) => sum + upload.total, 0);
      },

      get uploadedBytes() {
        return this.uploads.reduce((sum, upload) => sum + upload.loaded, 0);
      },

      get overallUploadProgress() {
        if (this.totalUploadBytes === 0) return 0;
        return Math.round((this.uploadedBytes / this.totalUploadBytes) * 100);
      },

      get hasFinishedUploads() {
        return this.uploads.some((upload) =>
          ["done", "failed", "canceled"].includes(upload.status),
        );
      },

      get uploadQueueSummary() {
        const total = this.uploads.length;
        const done = this.uploads.filter((u) => u.status === "done").length;
        const failed = this.uploads.filter((u) => u.status === "failed").length;
        const uploading = this.uploads.filter(
          (u) => u.status === "uploading",
        ).length;

        if (uploading > 0) {
          return `${uploading} uploading · ${this.formatBytes(
            this.totalUploadBytes,
          )}`;
        }

        if (failed > 0) {
          return `${failed} failed · ${done}/${total} done`;
        }

        if (done === total && total > 0) {
          return `${total} completed · ${this.formatBytes(
            this.totalUploadBytes,
          )}`;
        }

        return `${total} files · ${this.formatBytes(this.totalUploadBytes)}`;
      },

      enqueueUploads(attachments) {
        if (attachments.length === 0) return;

        for (const attachment of attachments) {
          this.uploads.push({
            id: ++this.uploadSeq,
            file: attachment.file,
            name: attachment.name,
            size: attachment.size,
            loaded: 0,
            total: attachment.size,
            progress: 0,
            status: "queued",
            error: "",
            xhr: null,
          });
        }

        this.uploadQueueCollapsed = false;
        this.processUploadQueue();
      },

      processUploadQueue() {
        while (this.activeUploads < this.maxConcurrentUploads) {
          const next = this.uploads.find(
            (upload) => upload.status === "queued",
          );
          if (!next) return;

          this.startUpload(next);
        }
      },

      startUpload(upload) {
        upload.status = "uploading";
        upload.error = "";
        upload.loaded = 0;
        upload.progress = 0;

        this.activeUploads += 1;

        const form = new FormData();
        form.append("file", upload.file, upload.name);

        const xhr = new XMLHttpRequest();
        upload.xhr = xhr;

        xhr.upload.onprogress = (event) => {
          if (!event.lengthComputable) return;

          upload.loaded = event.loaded;
          upload.total = event.total || upload.size;
          upload.progress = Math.min(
            99,
            Math.round((event.loaded / upload.total) * 100),
          );
        };

        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            upload.loaded = upload.total;
            upload.progress = 100;
            upload.status = "done";
          } else {
            upload.status = "failed";
            upload.error = this.uploadErrorMessage(xhr);
          }

          this.finishUpload(upload);
        };

        xhr.onerror = () => {
          upload.status = "failed";
          upload.error = "Network error";
          this.finishUpload(upload);
        };

        xhr.onabort = () => {
          upload.status = "canceled";
          upload.error = "";
          this.finishUpload(upload);
        };

        xhr.open("POST", "/api/upload");
        xhr.setRequestHeader("Accept", "application/json");
        xhr.send(form);
      },

      uploadErrorMessage(xhr) {
        const fallback = `Upload failed with HTTP ${xhr.status}`;
        const body = xhr.responseText || "";
        if (!body) return fallback;

        try {
          const parsed = JSON.parse(body);
          if (
            parsed &&
            typeof parsed.message === "string" &&
            parsed.message.trim()
          ) {
            return parsed.message;
          }
        } catch {
          return fallback;
        }

        return fallback;
      },

      finishUpload(upload) {
        upload.xhr = null;
        this.activeUploads = Math.max(0, this.activeUploads - 1);
        this.processUploadQueue();
      },

      cancelUpload(upload) {
        if (upload.status === "queued") {
          upload.status = "canceled";
          upload.loaded = 0;
          upload.progress = 0;
          return;
        }

        if (upload.status === "uploading" && upload.xhr) {
          upload.xhr.abort();
        }
      },

      retryUpload(upload) {
        if (!["failed", "canceled"].includes(upload.status)) return;

        upload.loaded = 0;
        upload.total = upload.size;
        upload.progress = 0;
        upload.error = "";
        upload.status = "queued";
        this.processUploadQueue();
      },

      clearFinishedUploads() {
        this.uploads = this.uploads.filter(
          (upload) =>
            upload.status === "queued" || upload.status === "uploading",
        );
      },

      closeUploadQueue() {
        const hasActiveUploads = this.uploads.some((upload) =>
          ["queued", "uploading"].includes(upload.status),
        );

        if (hasActiveUploads) {
          this.uploadQueueCollapsed = true;
          return;
        }

        this.uploads = [];
      },

      statusLabel(upload) {
        switch (upload.status) {
          case "queued":
            return "Queued";
          case "uploading":
            return "Uploading";
          case "done":
            return "Done";
          case "failed":
            return "Failed";
          case "canceled":
            return "Canceled";
          default:
            return upload.status;
        }
      },

      formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) return "0 B";

        const units = ["B", "KB", "MB", "GB", "TB"];
        let value = bytes;
        let unitIndex = 0;

        while (value >= 1024 && unitIndex < units.length - 1) {
          value /= 1024;
          unitIndex += 1;
        }

        if (unitIndex === 0) {
          return `${Math.round(value)} ${units[unitIndex]}`;
        }

        return `${value.toFixed(1)} ${units[unitIndex]}`;
      },
    });

    document.addEventListener("alpine:init", () => {
      if (window.Alpine.store(uploadStoreName)) return;
      window.Alpine.store(uploadStoreName, createUploadStore());
    });
  })();
</script>
{{end}}
