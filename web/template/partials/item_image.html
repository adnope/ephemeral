{{define "item_image"}}
<div>
  <dialog
    x-ref="imgDialog_{{.ID}}"
    class="media-dialog"
    data-media-nav-mode="chat"
    tabindex="-1"
    @keydown.window="handleMediaDialogKeydown($event, $el)"
  >
    {{template "media_dialog_actions" .}} {{template "media_dialog_nav_chat" .}}
    {{template "media_dialog_meta" .}}

    <img
      src="{{fileURL .Content}}"
      alt="{{.Filename}}"
      class="media-dialog-img"
    />
  </dialog>

  <img
    src="{{if .Metadata.Thumb}}{{fileURL .Metadata.Thumb}}{{else}}{{fileURL .Content}}{{end}}"
    alt="{{.Filename}}"
    class="bubble-image"
    @click="openMediaDialog($refs.imgDialog_{{.ID}})"
    style="cursor: pointer"
  />

  <div class="bubble-file-meta">
    <span class="bubble-file-name">{{.Filename}}</span>
    <span class="bubble-file-size">{{formatSize .Filesize}}</span>
  </div>
</div>
{{end}}
