{{define "upload_queue"}}
<section
  x-cloak
  x-data
  x-show="$store.uploads.hasUploads"
  class="upload-queue"
  x-bind:class="{ 'is-collapsed': $store.uploads.uploadQueueCollapsed }"
  aria-label="Upload queue"
>
  <div class="upload-queue-header">
    <button
      type="button"
      class="upload-queue-toggle"
      x-on:click="$store.uploads.uploadQueueCollapsed = !$store.uploads.uploadQueueCollapsed"
      x-bind:aria-expanded="(!$store.uploads.uploadQueueCollapsed).toString()"
    >
      <span class="upload-queue-title">
        <span>Uploads</span>
        <span
          class="upload-queue-summary"
          x-text="$store.uploads.uploadQueueSummary"
        ></span>
      </span>

      <span
        class="upload-queue-chevron"
        x-text="$store.uploads.uploadQueueCollapsed ? '▲' : '▼'"
        aria-hidden="true"
      ></span>
    </button>

    <button
      type="button"
      class="upload-queue-close"
      aria-label="Close upload queue"
      x-on:click="$store.uploads.closeUploadQueue()"
    >
      ×
    </button>
  </div>

  <div class="upload-queue-overall">
    <div
      class="upload-progress-fill"
      x-bind:style="`width: ${$store.uploads.overallUploadProgress}%`"
    ></div>
  </div>

  <div
    class="upload-queue-collapsed-meta"
    x-show="$store.uploads.uploadQueueCollapsed"
  >
    <span
      x-text="$store.uploads.formatBytes($store.uploads.uploadedBytes)"
    ></span>
    <span>/</span>
    <span
      x-text="$store.uploads.formatBytes($store.uploads.totalUploadBytes)"
    ></span>
    <span>·</span>
    <span x-text="`${$store.uploads.overallUploadProgress}%`"></span>
  </div>

  <div class="upload-queue-body" x-show="!$store.uploads.uploadQueueCollapsed">
    <template x-for="upload in $store.uploads.uploads" x-bind:key="upload.id">
      <article class="upload-queue-item">
        <div class="upload-item-main">
          <div class="upload-item-name" x-text="upload.name"></div>
          <div class="upload-item-meta">
            <span x-text="$store.uploads.formatBytes(upload.size)"></span>
            <span>·</span>
            <span x-text="$store.uploads.statusLabel(upload)"></span>
          </div>
        </div>

        <div class="upload-item-progress-row">
          <div class="upload-item-progress">
            <div
              class="upload-progress-fill"
              x-bind:class="{ 'is-failed': upload.status === 'failed', 'is-done': upload.status === 'done' }"
              x-bind:style="`width: ${upload.progress}%`"
            ></div>
          </div>

          <span
            class="upload-item-percent"
            x-text="`${upload.progress}%`"
          ></span>
        </div>

        <div
          class="upload-item-error"
          x-show="upload.status === 'failed'"
          x-text="upload.error"
        ></div>

        <div class="upload-item-actions">
          <button
            type="button"
            class="upload-action-link"
            x-show="upload.status === 'queued' || upload.status === 'uploading'"
            x-on:click="$store.uploads.cancelUpload(upload)"
          >
            Cancel
          </button>

          <button
            type="button"
            class="upload-action-link"
            x-show="upload.status === 'failed' || upload.status === 'canceled'"
            x-on:click="$store.uploads.retryUpload(upload)"
          >
            Retry
          </button>
        </div>
      </article>
    </template>

    <div class="upload-queue-footer">
      <button
        type="button"
        class="upload-action-link"
        x-on:click="$store.uploads.clearFinishedUploads()"
        x-show="$store.uploads.hasFinishedUploads"
      >
        Clear completed
      </button>
    </div>
  </div>
</section>
{{end}}
